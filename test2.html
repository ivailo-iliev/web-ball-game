<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>1 projector pixel</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;

      /* Try hard to keep 1px edges crisp */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font: 14px/1.3 -apple-system, system-ui, sans-serif;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">Tap: toggle test/pixel • Double-tap: fullscreen</div>

<script>
(() => {
  // Target external framebuffer (your projector input)
  const OUT_W = 1280, OUT_H = 720;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

  // Render in projector pixels
  canvas.width  = OUT_W;
  canvas.height = OUT_H;

  // No smoothing anywhere
  ctx.imageSmoothingEnabled = false;

  let mode = "test"; // "test" or "pixel"

  function clear() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, OUT_W, OUT_H);
  }

  // 1-pixel checkerboard: if you see gray/blur, you are NOT 1:1
  function drawTestPattern() {
    const img = ctx.createImageData(OUT_W, OUT_H);
    const d = img.data;
    for (let y = 0; y < OUT_H; y++) {
      for (let x = 0; x < OUT_W; x++) {
        const on = (x ^ y) & 1;      // alternating 1px pattern
        const v = on ? 255 : 0;
        const i = (y * OUT_W + x) * 4;
        d[i+0] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // Draw exactly one projector pixel at (x,y)
  function drawOnePixel(x, y, color = "#fff") {
    clear();
    ctx.fillStyle = color;
    ctx.fillRect(x|0, y|0, 1, 1);
  }

  function render() {
    if (mode === "test") drawTestPattern();
    else drawOnePixel(640, 360, "#fff"); // center pixel
  }

  // Tap toggles modes
  window.addEventListener('click', () => {
    mode = (mode === "test") ? "pixel" : "test";
    render();
  }, { passive: true });

  // Double tap to request fullscreen (works on many recent iOS versions)
  let lastTap = 0;
  window.addEventListener('touchend', async () => {
    const now = Date.now();
    if (now - lastTap < 300) {
      try { await document.documentElement.requestFullscreen(); } catch {}
    }
    lastTap = now;
  }, { passive: true });

  render();
})();
</script>
</body>
</html>
