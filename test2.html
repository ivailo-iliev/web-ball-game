<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Magenta Dot Sharpness Test</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Canvas fills the app viewport */
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      touch-action: manipulation;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Button overlay */
    #fsBtn {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      right: calc(env(safe-area-inset-right) + 12px);
      z-index: 10;
      font: 15px/1 -apple-system, system-ui, sans-serif;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.92);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    #fsBtn:active { transform: scale(0.98); }
  </style>
</head>

<body>
  <button id="fsBtn" type="button">Full Screen</button>
  <canvas id="out"></canvas>

<script>
(() => {
  const OUT_W = 1600, OUT_H = 1200;   // reported input
  const LOG_W = 1024, LOG_H = 768;    // projector native (XGA)

  const sizes = [1,2,3,4,5,6,8,10,12,14,16,18,20,24,28,32];

  const out = document.getElementById('out');
  const octx = out.getContext('2d', { alpha:false, desynchronized:true });

  out.width = OUT_W;
  out.height = OUT_H;

  const logical = document.createElement('canvas');
  logical.width = LOG_W;
  logical.height = LOG_H;
  const lctx = logical.getContext('2d', { alpha:false });

  let mode = 1; // 1=Direct OUT, 2=LOG->OUT smoothing, 3=LOG->OUT nearest
  let lastToggleAt = 0;

  function clear(ctx, w, h) {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);
  }

  function drawScene(ctx, W, H, dotSizes, title) {
    clear(ctx, W, H);

    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "30px -apple-system, system-ui, sans-serif";
    ctx.fillText(title, 24, 46);

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 4;
    ctx.strokeRect(10, 80, W - 20, H - 90);

    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(Math.floor(W/2), 80, 1, H - 80);
    ctx.fillRect(0, Math.floor((H + 80)/2), W, 1);

    const cols = 4;
    const rows = Math.ceil(dotSizes.length / cols);
    const cellW = Math.floor(W / cols);
    const cellH = Math.floor((H - 90) / rows);

    for (let i = 0; i < dotSizes.length; i++) {
      const s = dotSizes[i];
      const r = Math.floor(i / cols);
      const c = i % cols;

      const cx = c * cellW + Math.floor(cellW / 2);
      const cy = 90 + r * cellH + Math.floor(cellH / 2);

      ctx.fillStyle = "#ff00ff";
      ctx.fillRect(cx - Math.floor(s/2), cy - Math.floor(s/2), s, s);

      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.font = "24px -apple-system, system-ui, sans-serif";
      ctx.fillText(`${s}px`, cx - 26, cy + Math.floor(cellH/2) - 16);
    }
  }

  function render() {
    if (mode === 1) {
      octx.imageSmoothingEnabled = false;
      drawScene(octx, OUT_W, OUT_H, sizes, "Mode 1/3: Direct 1600×1200 (no smoothing)");
      return;
    }

    lctx.imageSmoothingEnabled = false;

    if (mode === 2) {
      drawScene(lctx, LOG_W, LOG_H, sizes, "Mode 2/3: 1024×768 → 1600×1200 (smoothing ON)");
      octx.imageSmoothingEnabled = true;
    } else {
      drawScene(lctx, LOG_W, LOG_H, sizes, "Mode 3/3: 1024×768 → 1600×1200 (nearest-neighbor)");
      octx.imageSmoothingEnabled = false;
    }

    clear(octx, OUT_W, OUT_H);
    octx.drawImage(logical, 0, 0, LOG_W, LOG_H, 0, 0, OUT_W, OUT_H);
  }

  function toggleMode() {
    const now = performance.now();
    if (now - lastToggleAt < 250) return;
    lastToggleAt = now;
    mode = (mode % 3) + 1;
    render();
  }

  if (window.PointerEvent) {
    out.addEventListener('pointerup', toggleMode, { passive: true });
  } else {
    out.addEventListener('touchend', toggleMode, { passive: true });
    out.addEventListener('mouseup', toggleMode, { passive: true });
  }

  // Fullscreen button (works where supported; safe no-op otherwise)
  const fsBtn = document.getElementById('fsBtn');
  fsBtn.addEventListener('click', async (e) => {
    e.stopPropagation(); // don't toggle mode when pressing the button
    try {
      if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      } else if (document.exitFullscreen) {
        await document.exitFullscreen();
      }
    } catch {
      // Ignore: A2HS/Web App mode may block Fullscreen API.
    }
  });

  // Some iOS versions need a re-render after orientation/fullscreen changes
  window.addEventListener('resize', () => requestAnimationFrame(render));

  render();
})();
</script>
</body>
</html>
