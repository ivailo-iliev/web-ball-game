<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Green dot sizes</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #app {
      position: fixed;
      inset: 0;
      background: #000;
      touch-action: manipulation;
    }
    .dot {
      position: absolute;
      background: rgb(0,255,0); /* pure green */
      /* no transforms (avoid fractional rendering) */
    }
    #toast {
      position: fixed;
      left: calc(env(safe-area-inset-left) + 12px);
      top: calc(env(safe-area-inset-top) + 12px);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.92);
      font: 18px/1 -apple-system, system-ui, sans-serif;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms linear;
      user-select: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast"></div>

<script>
(() => {
  const app = document.getElementById('app');
  const toast = document.getElementById('toast');

  // 1..64 CSS pixels
  const MAX = 64;
  const sizes = Array.from({ length: MAX }, (_, i) => i + 1);

  let toastTimer = null;

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 900);
  }

  function clearDots() {
    app.textContent = '';
  }

  function layout() {
    clearDots();

    const vw = Math.floor(window.innerWidth);
    const vh = Math.floor(window.innerHeight);
    const N = sizes.length;

    // Choose cols/rows based on viewport aspect (keeps cells roughly square)
    const cols = Math.max(1, Math.ceil(Math.sqrt(N * (vw / vh))));
    const rows = Math.ceil(N / cols);

    const cellW = Math.max(1, Math.floor(vw / cols));
    const cellH = Math.max(1, Math.floor(vh / rows));

    // Place dots cell-by-cell using integer pixel positions
    for (let i = 0; i < N; i++) {
      const s = sizes[i];
      const r = Math.floor(i / cols);
      const c = i % cols;

      // Center of cell (integer)
      const cx = c * cellW + Math.floor(cellW / 2);
      const cy = r * cellH + Math.floor(cellH / 2);

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.dataset.size = String(s);
      dot.style.width = s + 'px';
      dot.style.height = s + 'px';
      dot.style.left = (cx - Math.floor(s / 2)) + 'px';
      dot.style.top  = (cy - Math.floor(s / 2)) + 'px';

      app.appendChild(dot);
    }
  }

  // Tap a dot to show its size (no persistent labels)
  let lastTapAt = 0;
  app.addEventListener('pointerup', (e) => {
    const now = performance.now();
    if (now - lastTapAt < 80) return; // tiny debounce
    lastTapAt = now;

    const t = e.target;
    if (t && t.classList && t.classList.contains('dot')) {
      showToast(`${t.dataset.size}px`);
    }
  }, { passive: true });

  window.addEventListener('resize', () => requestAnimationFrame(layout), { passive: true });
  window.addEventListener('orientationchange', () => requestAnimationFrame(layout), { passive: true });

  layout();
})();
</script>
</body>
</html>
